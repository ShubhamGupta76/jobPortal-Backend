spring.application.name=job-portal-backend

# ================= DATABASE =================
spring.datasource.url=jdbc:mysql://localhost:3306/JP?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ================= JPA =================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ================= JWT =================
jwt.secret=mySuperSecureJwtSecretKeyForJobPortal2026AuthToken123456789
jwt.expiration=86400000

# ================= FILE UPLOAD =================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ================= SERVER =================
server.port=8080

# ================= PISTON CODE EXECUTION =================
piston.api.url=${PISTON_API_URL:http://localhost:2000}

# ================= EMAIL (GMAIL SMTP) =================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.protocol=smtp
spring.mail.default-encoding=UTF-8

# ================= OTP CONFIG =================
app.otp.expiry-minutes=5
app.otp.max-attempts=3
app.otp.resend-delay-seconds=30

# ================= LOGGING =================
logging.level.com.job_Portal_Backend=DEBUG
